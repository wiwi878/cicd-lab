name: CI Homework 314552034

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: ci-homework-314552034-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, format, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier check
        run: npm run format:check

      - name: Run tests with JUnit report
        run: |
          mkdir -p reports
          npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Vitest test results
          path: reports/vitest-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit-report
          path: reports/vitest-junit.xml
          if-no-files-found: warn
